replicaCount: 1
image:
  repository: your-docker-hub-username/product-b-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

promotion:
  strategy: "sequential"

ingress:
  enabled: false
  annotations: {}
  hosts: []
  tls: []
