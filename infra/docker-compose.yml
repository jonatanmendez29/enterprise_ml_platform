version: '3.9'

services:
  minio:
    image: minio/minio:RELEASE.2026-01-05T00-00-04Z
    command: server /data
    ports:
      - 9000:9000
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feast
      POSTGRES_PASSWORD: feast
      POSTGRES_DB: feast
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:3.10.1
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_PYRAMID_PATH: /tmp/mlflow
    ports:
      - 5000:5000
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /tmp/mlflow --host 0.0.0.0
    volumes:
      - ./mlflow:/tmp/mlflow

volumes:
  minio_data:
  postgres_data:
